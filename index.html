<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowVideo Player Ultimate</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0d0d0d; color: white; text-align: center; padding: 15px; margin: 0; }
        .main-container { background: #161616; max-width: 650px; margin: 20px auto; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #262626; }
        h2 { color: #00ff66; margin-top: 5px; font-size: 26px; font-weight: bold; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] { background: #222222; color: white; border: 1px solid #3a3a3a; padding: 15px; border-radius: 10px; width: 88%; font-size: 15px; outline: none; text-align: center; margin-bottom: 20px; }
        input[type="text"]:focus { border-color: #00ff66; }
        
        .btn-flow { background: #00ff66; color: #000; font-weight: bold; padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; width: 93%; transition: 0.3s; }
        .btn-flow:hover { background: #00cc52; box-shadow: 0 5px 15px rgba(0,255,102,0.4); }
        
        /* Direct Action Buttons Section */
        .action-box { display: none; margin-top: 25px; flex-direction: column; gap: 15px; align-items: center; }
        .btn-link { color: black; font-weight: bold; padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; width: 88%; text-decoration: none; display: block; text-align: center; transition: 0.3s; }
        .btn-play-direct { background: #38b6ff; }
        .btn-play-direct:hover { background: #0099ff; box-shadow: 0 5px 15px rgba(56,182,255,0.4); }
        .btn-dl-direct { background: #ffcc00; }
        .btn-dl-direct:hover { background: #e6b800; box-shadow: 0 5px 15px rgba(255,204,0,0.4); }

        hr { border: 0; border-top: 1px solid #262626; margin: 30px 0 20px 0; }
        .box-container { display: flex; gap: 15px; justify-content: center; }
        .video-box { background: #1f1f1f; border: 1px solid #333; border-radius: 12px; width: 46%; cursor: pointer; text-decoration: none; color: white; overflow: hidden; display: block; text-align: left; transition: 0.3s; }
        .video-box:hover { border-color: #00ff66; transform: translateY(-4px); }
        .poster-img { width: 100%; height: 120px; object-fit: cover; background: #000; border-bottom: 1px solid #333; }
        .box-info { padding: 10px; }
        .box-title { font-weight: bold; font-size: 14px; color: #00ff66; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>FlowVideo Player</h2>
    <p>TeraBox લિંક પેસ્ટ કરીને મખ્ખનની જેમ પ્લે કરો</p>
    
    <input type="text" id="teraboxLink" placeholder="અહીં તમારી TeraBox (1024terabox) લિંક પેસ્ટ કરો...">
    <button class="btn-flow" onclick="generateFlowLinks()">▶️ Video Unlock કરો</button>

    <div class="action-box" id="actionContainer">
        <a href="#" id="playUrl" target="_blank" class="btn-link btn-play-direct">▶️ Video ઓનલાઇન પ્લે કરો (Ad-Free)</a>
        <a href="#" id="downloadUrl" target="_blank" class="btn-link btn-dl-direct">📥 હાઇ સ્પીડ ડાઉનલોડ કરો</a>
    </div>

    <hr>

    <div style="color: #aaaaaa; font-size: 15px; margin-bottom: 15px;">અમારા અન્ય ખાસ વિડિયો જુઓ</div>
    <div class="box-container">
        
        <a href="https://gujaratnewsportal-official.blogspot.com/p/video1.html" target="_blank" class="video-box">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500" class="poster-img" alt="Poster 1">
            <div class="box-info">
                <div class="box-title">🎬 ખાસ વિડિયો ૧</div>
            </div>
        </a>

        <a href="https://gujaratnewsportal-official.blogspot.com/p/video2.html" target="_blank" class="video-box">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500" class="poster-img" alt="Poster 2">
            <div class="box-info">
                <div class="box-title">🔥 ટ્રેન્ડિંગ વિડિયો ૨</div>
            </div>
        </a>

    </div>
</div>

<script>
function generateFlowLinks() {
    let inputUrl = document.getElementById('teraboxLink').value.trim();
    const actionBox = document.getElementById('actionContainer');
    const playBtn = document.getElementById('playUrl');
    const dlBtn = document.getElementById('downloadUrl');
    
    if (inputUrl === "") {
        alert("મહેરબાની કરીને પહેલા વિડિયો લિંક પેસ્ટ કરો!");
        return;
    }

    let surlId = "";
    // Robust Extraction logic to capture any type of TeraBox url format
    if (inputUrl.includes("surl=")) {
        surlId = inputUrl.split("surl=")[1].split("&")[0];
    } else if (inputUrl.includes("/s/")) {
        surlId = inputUrl.split("/s/")[1].split("?")[0];
    }

    if (surlId !== "") {
        // CHANGED: Fixed mirror routing logic to prevent black screens on browsers
        playBtn.href = "https://www.1024terabox.com/sharing/embed?surl=" + surlId;
        dlBtn.href = "https://www.1024terabox.com/sharing/link?surl=" + surlId;
        actionBox.style.display = "flex";
    } else {
        playBtn.href = inputUrl;
        dlBtn.href = inputUrl;
        actionBox.style.display = "flex";
    }
}
</script>

</body>
</html>
